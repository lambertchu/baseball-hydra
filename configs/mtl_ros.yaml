# Phase 2 ROS (rest-of-season) MTL configuration
# -------------------------------------------------
# Parallel to configs/mtl.yaml but for the in-season quantile MTL.  Trains
# on per-(player, season, ISO-week) cutoffs from weekly_snapshots_{year}.parquet
# and produces n_quantiles predictions per rate target + a PA-remaining head.

model:
  n_quantiles: 5
  hidden_dims: [256, 128, 64]
  head_dim: 32
  dropouts: [0.3, 0.2, 0.1]
  two_stage: true           # rate heads feed into count heads (detached medians)
  use_residual: false
  speed_head_indices: [5]   # SB head reads backbone only (no rate input)
  speed_heads_receive_rates: false
  taus: [0.05, 0.25, 0.50, 0.75, 0.95]

loss:
  pa_loss: "mse"            # 'mse' or 'gaussian_nll'
  pa_weight: 1.0

training:
  batch_size: 64
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 10
  recency_decay_lambda: 0.30  # exponential decay (0=disabled, 0.30≈2.3yr half-life)
  min_ytd_pa: 50              # drop cutoffs with pa_ytd < this (rate targets too noisy)
  device: "cpu"

ensemble:
  n_seeds: 5
  base_seed: 42

data:
  snapshots_dir: "data/raw"
  snapshots_pattern: "weekly_snapshots_{year}.parquet"
  preseason_path: "data/merged_batter_data.parquet"
  # Preseason feature groups to include alongside the in-season features.
  # Keep conservative — nothing here should be computed from current-season data.
  #
  # `team_stats` disabled: the stored team stats (team_runs_per_game, team_ops,
  # team_sb, ...) are END-OF-SEASON totals in `merged_batter_data.parquet`.
  # Joining them on (mlbam_id, season) would leak future information into
  # mid-season rows (a week-10 row would get the full-season team OPS). Re-enable
  # once we build a team-through-week-W aggregate.
  # `park_factors` are static per-stadium per-year — safe to include.
  preseason_feature_groups:
    age: true
    park_factors: true
    team_stats: false
    temporal: true
  include_in_season_features: true

splits:
  train_end_season: 2022
  val_season: 2023
  test_season: 2024

output:
  model_dir: "data/models/mtl_ros_quantile"
  report_path: "data/reports/mtl_ros_report.json"

seed: 42
